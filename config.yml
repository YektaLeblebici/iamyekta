baseURL: "https://iamyekta.com/"
locale: "en-us"
title: "Yekta Leblebici"
theme: "iamyekta-terminal"
description : "Yekta Leblebici, all about me."
defaultLayout: "post"
defaultContentLanguage: "en"
enableRobotsTXT: True
enableEmoji: True
# Taxonomies are unused; don't generate empty /tags/ and /categories/.
disableKinds: ["taxonomy", "term"]
paginate: 10
paginatePath: "page"
publishDir: "public"
pygmentsCodeFencesGuessSyntax: True
pygmentsStyle: "github"
rssLimit: 15
smartypants: False

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_Lines: ""
    hl_inline: false
    lineAnchors: ""
    lineNoStart: 1
    lineNos: false
    lineNumbersInTable: false
    noClasses: false
    noHl: false
    style: catppuccin-frappe
    tabWidth: 2

permalinks:
  post: /post/:year/:month/:title/
  page: /:title/

menu: 
  main:
    - name: "Hello"
      url: "/"
    - name: "Posts"
      url: "/post/"
    - name: "Say Hi!"
      url: "mailto:hi@iamyekta.com"

# Change it to false when we need more performance.
disableFastRender: True

# Image processing defaults for the responsive image pipeline.
imaging:
  quality: 82
  resampleFilter: "Lanczos"

# Parameters
params:
  name: "Yekta Leblebici"
  shortName: "Yekta"
  # Post emojis are themed at build time and self-hosted (see partials/emojify.html).
  # "twemoji" (vendored colour SVGs) | "" (system emojis). Emoji the set lacks
  # fall back to the system emoji automatically.
  emojiset: "twemoji"
  shortBio: "I'm an infrastructure-focused software developer currently living in <b>Berlin</b>. With a passion for everything that happens on a computer screen, I've been hacking around Linux terminals from my early ages for the last 20 years. Nowadays I do <b>Linux</b>, <b>Cloud</b>, <b>Platform</b>, <b>Go</b> and <b>Web</b> stuff for work and leisure.
  
  <p>In my evenings, I enjoy reading books and scrolling through Hacker News, as well as playing various games, and watching sci-fi, fantasy and animated movies.</p>"
  githubLink: "https://github.com/YektaLeblebici"
  linkedinLink: "https://www.linkedin.com/in/yekta-leblebici"
  keybaseLink: "https://keybase.io/yekta_l"
  mailAddr: "hi@iamyekta.com"
  githubRepositoryOfWebsite: "https://github.com/YektaLeblebici/iamyekta"

  logo:
    showOnIndexPage: False
    url:  "profile.jpg"
    width: 50
    height: 50
    alt: "Logo"

  icon:
    url: "favicon-32x32.png"
