services:
  nginx:
    build:
      context: .
      args:
        # Empty in prod (config baseURL); make dev-up sets HUGO_BASEURL=/ so
        # links/fonts are host-relative instead of pointing at the live site.
        HUGO_BASEURL: "${HUGO_BASEURL:-}"
    image: yekta/iamyekta-nginx:latest
    hostname: "nginx"
    domainname: "iamyekta.com"
    ports:
      # Host port defaults to 80 (prod); WEB_PORT overrides it (e.g. make dev-up
      # uses 8001 on a dev box that can't bind privileged :80).
      - "${WEB_PORT:-80}:80"
    restart: always
    security_opt:
      - "no-new-privileges:true"
    # Read-only rootfs; nginx writes only to these tmpfs paths. Drop all caps,
    # re-adding just what the root master needs to drop to the worker user and
    # bind :80.
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    networks:
      - web_network

networks:
  web_network:
    name: web_network