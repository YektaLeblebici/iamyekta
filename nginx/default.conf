# Hide the nginx version in headers and error pages.
server_tokens off;

# Compress text assets (binary types like woff2/webp/jpg are already compressed).
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_vary on;
gzip_types text/css application/javascript image/svg+xml application/xml application/rss+xml application/atom+xml text/plain;

# Redirect www -> non-www, preserving the full path and query string.
server {
    listen       80;
    server_name  www.iamyekta.com;
    return       301 https://iamyekta.com$request_uri;
}

server {
    listen       80 default_server;
    server_name  iamyekta.com;

    root   /usr/share/nginx/html;
    index  index.html;

    # Basic security headers (apply to all responses, incl. errors and assets).
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
    }

    # Cache static / fingerprinted assets for an hour.
    location ~* \.(css|js|woff2|webp|avif|jpe?g|png|gif|svg|ico)$ {
        expires 1h;
        access_log off;
    }

    # Custom 404 page.
    error_page 404 /404.html;
}
